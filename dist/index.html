<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
  <script type="module" crossorigin src="/assets/index-CspMAkpN.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-x1XGuNl0.css">
</head>

<body>
    <label for="inputLocation">Enter the city</label>
    <input type="text" id="inputLocation" placeholder="London">
    <button id="getBtn">get weather!</button>

    <!-- SVG -->
    <img src="@meteocons/svg/fill/clear-day.svg" alt="Clear day" />

    <!-- Lottie (with lottie-web) -->
    <script>
        import lottie from 'lottie-web';
        import clearDay from '@meteocons/lottie/fill/clear-day.json';

        lottie.loadAnimation({
            container: document.getElementById('icon'),
            animationData: clearDay,
            loop: true,
            autoplay: true,
        });
    </script>
</body>

</html>
